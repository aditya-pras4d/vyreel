<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vyreel — Creator Onboarding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #111214;
      color: #FAF7F1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* Constellation background */
    .constellation {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .constellation svg {
      width: 100%;
      height: 100%;
    }

    .card {
      position: relative;
      z-index: 1;
      background: #111214;
      border: 1px solid rgba(0, 198, 255, 0.15);
      border-radius: 4px;
      padding: 48px;
      width: 100%;
      max-width: 460px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
    }
    .logo-star {
      color: #FFE65A;
      font-size: 20px;
      line-height: 1;
    }
    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      color: #FAF7F1;
      letter-spacing: -0.3px;
    }

    .step-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: #00C6FF;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #FAF7F1;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .subtitle {
      font-size: 13px;
      color: #A9B1A6;
      margin-bottom: 36px;
      line-height: 1.5;
    }

    label {
      display: block;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #A9B1A6;
      margin-bottom: 8px;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(169, 177, 166, 0.2);
      border-radius: 3px;
      color: #FAF7F1;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      margin-bottom: 22px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus {
      border-color: #00C6FF;
      background: rgba(0, 198, 255, 0.04);
    }
    input::placeholder { color: rgba(250,247,241,0.25); }
    select option { background: #1a1c1f; color: #FAF7F1; }

    .error {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: 12px 14px;
      border-radius: 3px;
      font-size: 13px;
      margin-bottom: 22px;
    }

    button {
      width: 100%;
      padding: 13px;
      background: #00C6FF;
      color: #111214;
      border: none;
      border-radius: 3px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.88; }

    .footer-note {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: rgba(169,177,166,0.5);
      text-align: center;
      margin-top: 20px;
      letter-spacing: 0.5px;
    }

    /* Hexagon accent */
    .hex-accent {
      position: absolute;
      opacity: 0.06;
    }
  </style>
</head>
<body>

  <!-- Constellation background -->
  <div class="constellation">
    <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <!-- Dashed connector lines -->
      <line x1="120" y1="80" x2="340" y2="200" stroke="#00C6FF" stroke-width="1" stroke-dasharray="4 4" stroke-opacity="0.25"/>
      <line x1="340" y1="200" x2="580" y2="140" stroke="#00C6FF" stroke-width="1" stroke-dasharray="4 4" stroke-opacity="0.2"/>
      <line x1="1100" y1="300" x2="1320" y2="180" stroke="#00C6FF" stroke-width="1" stroke-dasharray="4 4" stroke-opacity="0.2"/>
      <line x1="1200" y1="600" x2="1380" y2="750" stroke="#B784FF" stroke-width="1" stroke-dasharray="4 4" stroke-opacity="0.2"/>
      <line x1="80" y1="700" x2="200" y2="820" stroke="#00C6FF" stroke-width="1" stroke-dasharray="4 4" stroke-opacity="0.18"/>

      <!-- Hexagonal nodes -->
      <polygon points="120,68 132,75 132,89 120,96 108,89 108,75" fill="#00C6FF" opacity="0.35"/>
      <polygon points="340,188 352,195 352,209 340,216 328,209 328,195" fill="#B784FF" opacity="0.3"/>
      <polygon points="580,128 590,134 590,146 580,152 570,146 570,134" fill="#00C6FF" opacity="0.25"/>
      <polygon points="1100,288 1112,295 1112,309 1100,316 1088,309 1088,295" fill="#B784FF" opacity="0.28"/>
      <polygon points="1320,168 1330,174 1330,186 1320,192 1310,186 1310,174" fill="#00C6FF" opacity="0.22"/>
      <polygon points="1200,588 1212,595 1212,609 1200,616 1188,609 1188,595" fill="#00C6FF" opacity="0.25"/>
      <polygon points="80,688 92,695 92,709 80,716 68,709 68,695" fill="#B784FF" opacity="0.2"/>
      <polygon points="200,808 210,814 210,826 200,832 190,826 190,814" fill="#FFE65A" opacity="0.22"/>

      <!-- Small dots -->
      <circle cx="460" cy="320" r="3" fill="#B784FF" opacity="0.4"/>
      <circle cx="890" cy="150" r="2" fill="#00C6FF" opacity="0.35"/>
      <circle cx="1050" cy="480" r="3" fill="#FFE65A" opacity="0.3"/>
      <circle cx="250" cy="550" r="2" fill="#00C6FF" opacity="0.3"/>
      <circle cx="700" cy="800" r="3" fill="#B784FF" opacity="0.25"/>
      <circle cx="1380" cy="450" r="2" fill="#FFE65A" opacity="0.25"/>

      <!-- Discovery star (large hexagon shape off-canvas) -->
      <polygon points="1380,600 1420,620 1440,660 1420,700 1380,720 1340,700 1320,660 1340,620" fill="#A9B1A6" opacity="0.06"/>
      <polygon points="1350,50 1400,80 1420,130 1400,180 1350,210 1300,180 1280,130 1300,80" fill="#A9B1A6" opacity="0.05"/>
    </svg>
  </div>

  <div class="card">
    <div class="logo">
      <span class="logo-star">✦</span>
      <span class="logo-text">Vyreel</span>
      <span style="color:#B784FF;font-size:14px;margin-left:2px;">✦</span>
    </div>

    <div class="step-label">Step 01 / 02 — Creator Details</div>
    <h1>Get started</h1>
    <div class="subtitle">Pilot access · AI/Tech niche · 2026</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label for="handle">Instagram handle</label>
      <input type="text" id="handle" name="handle" placeholder="@yourhandle" maxlength="31" pattern="@?[A-Za-z0-9._]{1,30}" required />

      <label for="phone">WhatsApp number — with country code</label>
      <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210" required />

      <label for="email">Email — where your brief is delivered</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required />

      <label for="timezone">Timezone</label>
      <select id="timezone" name="timezone">
        {% for tz in timezones %}
        <option value="{{ tz }}" {% if tz == "Asia/Kolkata" %}selected{% endif %}>{{ tz }}</option>
        {% endfor %}
      </select>

      <button type="submit">Continue →</button>
    </form>

    <div class="footer-note">Vyreel · Content Intelligence · Pilot 2026</div>
  </div>

</body>
</html>
